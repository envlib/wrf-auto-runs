# WRF-WVT (Water Vapor Tracers) configuration example
#
# This is a parameters.toml template for WVT simulations. Key differences from
# the standard template:
#   - [physics]: WVT requires WSM6 (mp=6), YSU PBL (bl=1), Kain-Fritsch (cu=1)
#   - [dynamics]: tracer_opt=4 activates moisture tracers
#   - [time_control]: auxinput8 settings for reading trmask files
#   - [wvt]: configures the tracer source mask (auto-generated from geo_em)
#
# The trmask file is created automatically after geogrid when tracer_opt=4.

# Number of MPI processes for wrf.exe (via mpirun -n)
n_cores = 8

# Additional wrfout variables to retain (ncks filter). Comment out to keep all.
# The per-region accumulators (TR_RAINNC, TR_RAINC, TR_SNOWNC, TR_GRAUPELNC,
# TRQFX, PWAT_TR, VIMF_TR_*) carry a wvt_regions axis on a single variable, so
# listing the name keeps every region. The 3D tracer named-members (qv_tr..qg_tr,
# tr_thum_{u,v}_phy_dt) are separate per region -- list the base name and it is
# auto-expanded to all num_wvt_regions (qv_tr -> qv_tr, qv_tr_02, ...), so the
# list stays stable when the region count changes.
# output_variables = ['T2', 'Q2', 'PSFC', 'U10', 'V10', 'RAINNC', 'RAINC', 'TR_RAINNC', 'TR_RAINC', 'TR_SNOWNC', 'TR_GRAUPELNC', 'TRQFX', 'PWAT_TR']

# =============================================================================
# Local (non-Docker) mode -- uncomment to run outside the Docker container.
# =============================================================================

# [no_docker]
# wps_path = '/home/mike/Build_WRF/WPS-4.6.0'
# wrf_path = '/home/mike/Build_WRF/WRF-4.6.1-ARW'
# data_path = '/home/mike/data/wrf/tests/test_data/'
# geog_data_path = '/home/mike/WPS_GEOG'

# =============================================================================
# Time control
# =============================================================================

[time_control]
start_date = "1990-07-02 00:00:00"
duration_hours = 48
interval_hours = 3

# WVT requires auxinput8 for the tracer mask file
io_form_auxinput8 = 2
auxinput8_inname = "trmask_d<domain>"

[time_control.history_file]
interval_hours = [24, 1, 1, 1, 1, 1]
begin_hours = 0

[time_control.summary_file]
output = true
interval_days = 1
n_days_per_file = 1

[time_control.z_level_file]
output = true
z_levels = [30, 80, 150, 200, 350, 500, 750, 1000, 1300, 1600, 2000, 2500, 3000, 4000, 5000, 7000, 10000]

# =============================================================================
# Domain geometry
# =============================================================================

[domains]
# run = [1, 2]
dx = 27000
dy = 27000
map_proj = 'lambert'
ref_lat = -39.619
ref_lon = 170.083
truelat1 = -39.619
truelat2 = -39.619
stand_lon = -129.917
parent_id         = [1, 1, 2, 3, 3, 3]
parent_grid_ratio = [1, 3, 3, 3, 3, 3]
i_parent_start    = [1, 35, 14, 160, 171, 42]
j_parent_start    = [1, 21, 12, 35, 308, 419]
e_we              = [100, 133, 316, 319, 316, 406]
e_sn              = [112, 202, 535, 832, 556, 238]
geog_data_res     = ['default', 'default', 'default', 'modis_15s_lake+default', 'modis_15s_lake+default', 'modis_15s_lake+default']
e_vert            = 33
p_top_requested   = 5000
parent_time_step_ratio = [1, 3, 3, 3, 3, 3]
feedback = 0

# =============================================================================
# Physics -- WVT REQUIRED SETTINGS
#
# WRF-WVT requires specific physics schemes:
#   mp_physics = 6       WSM6 microphysics
#   bl_pbl_physics = 1   YSU PBL scheme
#              = 0       No PBL (use with km_opt=5 SMS-3DTKE, requires scalar_pblmix=1, tracer_pblmix=1)
#   cu_physics = 1       Kain-Fritsch cumulus
#              = 11      Multi-scale Kain-Fritsch (scale-aware)
#              = 16      New Tiedtke
#              = 0       No cumulus (convection-resolving, dx < ~4 km)
#   scalar_pblmix = 0    With YSU PBL (prevent double mixing)
#                 = 1    With bl_pbl_physics=0 (diffusion module handles mixing)
#   tracer_pblmix = 0    With YSU PBL (prevent double mixing)
#                 = 1    With bl_pbl_physics=0 (diffusion module handles mixing)
#   sf_sfclay_physics = 1  Required by YSU PBL (also needed with SMS-3DTKE)
# =============================================================================

[physics]
mp_physics = 6
bl_pbl_physics = 1
cu_physics = [11, 11, 11, 0, 0, 0]
sf_sfclay_physics = 1
scalar_pblmix = 0
tracer_pblmix = 0

# =============================================================================
# Dynamics -- WVT REQUIRED SETTINGS
#
#   tracer_opt = 4       Activate WVT moisture tracers
#   tracer_adv_opt = 4   Positive-definite RK3 advection for tracers (required)
#   tracer2dsource = 1   Enable 2D source regions (read from trmask file)
#   tracer3dsource = 0   Enable 3D source regions (set to 1 if using TRMASK3D)
#   tracer3dsink = 0     Enable 3D sink regions (set to 1 if using TRMASK3D2)
#
# num_wvt_regions (number of simultaneous tagged source regions, 1..8) is NOT set
# here -- it is derived from the number of regions defined in [wvt] and injected
# into the namelist automatically. If you do set it, it must match the region count.
# Multi-region (>1) requires bl_pbl_physics=0 and tracer3dsource=tracer3dsink=0.
# =============================================================================

[dynamics]
diff_opt = 2                # Full diffusion (metric terms on slopes)
km_opt = 4                  # 2D Smagorinsky (km_opt=5 SMS-3DTKE is incompatible with YSU PBL)
tracer_opt = 4
tracer_adv_opt = 4
tracer2dsource = 1
tracer3dsource = 0
tracer3dsink = 0

# =============================================================================
# WVT tracer mask configuration
#
# Controls automatic generation of trmask_d<domain> files after geogrid. The
# mask defines where moisture is "tagged" as tracer moisture. A region is a
# mask_type selection optionally intersected with a bbox.
#
# mask_type options:
#   "land"   - All land points (from LANDMASK in geo_em). Default.
#   "ocean"  - All ocean points (inverse of LANDMASK)
#   "all"    - Entire domain (all grid points = source)
#
# Optional bbox restriction (set at most ONE per region; intersected with the
#   mask_type selection and evaluated per-domain):
#   bbox_deg = [min_lat, max_lat, min_lon, max_lon]  -- geographic degrees.
#     Bounds use XLONG's -180..180 frame; set min_lon > max_lon for an
#     antimeridian-crossing arc, e.g. [-90, 90, 156.6, -170] keeps the eastward
#     arc from 156.6E across 180 to -170.
#   bbox_ij = [i_min, i_max, j_min, j_max]  -- model-grid cell indices, 0-based
#     and INCLUSIVE, i = west-east, j = south-north. Straight, equal-area bands
#     that map 1:1 to the grid -- preferred for ocean-fetch sensitivity tests.
#   (The old min_lat/max_lat/min_lon/max_lon scalar keys raise an error.)
#
# relax_width: grid points at domain edges set to 0 (WRF relaxation zone -- not
#   tracer-conserving). Shared by all regions; defaults to spec_bdy_width.
#
# SINGLE region: set mask_type (+ optional bbox) directly under [wvt] (below).
#
# MULTIPLE regions (v2.0): add an array of [[wvt.regions]] tables instead -- one
#   per region, in WRF region-index order (region 1 = the unsuffixed tracer
#   fields, region 2 -> qv_tr_02 / TR_RAINNC[:,1,...], ...). Each region may set
#   its own mask_type/bbox and inherits the top-level mask_type as default.
#   num_wvt_regions is derived from the number of regions. Example (commented out
#   below): tag SW/Tasman ocean, north-of-NZ ocean, and NZ land-ET separately.
#
# Regions MUST be DISJOINT -- no grid cell may be in two regions' masks
#   (create_trmask.py errors on overlap). This is an attribution requirement, not
#   a WRF limit: each region tags its masked cells' surface evaporation, so a cell
#   in two regions is tagged TWICE, the per-region amounts double-count, and the
#   fractions stop summing to 1. With disjoint regions each region IS the isolated
#   contribution from its source area, and the set sums EXACTLY to the single
#   all-source run. So to combine areas you ADD the per-region TR_RAINNC (you do
#   NOT subtract one region from another); to compare overlapping/nested fetches,
#   run them as separate single-region simulations.
# =============================================================================

[wvt]
mask_type = "ocean"
# relax_width = 5  # defaults to spec_bdy_width, usually no need to set explicitly
# Optional bbox restriction -- set at most ONE of bbox_deg / bbox_ij:
# bbox_deg = [-42.0, -38.0, 168.0, 175.0]   # [min_lat, max_lat, min_lon, max_lon]
# bbox_ij  = [38, 276, 0, 323]              # [i_min, i_max, j_min, j_max] (0-based inclusive)

# --- Multi-region form (uncomment and remove the single-region keys above) ----
# [wvt]
# mask_type = "ocean"          # default inherited by every region below
#
# [[wvt.regions]]
# name = "west"                # region 1 (unsuffixed fields)
# bbox_deg = [-48, -34, 162, 172]
#
# [[wvt.regions]]
# name = "north"               # region 2 (qv_tr_02, TR_RAINNC[:,1,...])
# bbox_deg = [-38, -30, 170, 180]
#
# [[wvt.regions]]
# name = "nz_land_et"          # region 3: NZ land ET (override mask_type; bbox excludes other landmasses)
# mask_type = "land"
# bbox_deg = [-47.5, -34, 166, 179]

# =============================================================================
# FDDA (grid nudging) -- optional
# =============================================================================

# [fdda]
# grid_fdda = [1, 1, 0, 0, 0, 0]

# =============================================================================
# Remote storage
# =============================================================================

[remote]

[remote.era5]
type = 's3'
provider = 'Mega'
endpoint = 'https://s3.ca-west-1.s4.mega.io'
access_key_id = ''
secret_access_key = ''
path = '/data/ncar/era5/'

